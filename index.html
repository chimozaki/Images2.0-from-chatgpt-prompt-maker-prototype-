action:['カメラ目線で微笑んでいる。自然で温かみのある表情、リラックスしたポーズ。','風が吹くなか、振り返りながらこちらを見ている。髪と衣装が風になびく。','空中で身体を回転させながら攻撃を放つ。遠心力と躍動感が画面全体に伝わる。','本を読みながら、ふと顔を上げてこちらを見た瞬間。自然な日常のひとコマ。','夕焼けの空を背景に、高台に立ってはるか遠くを見つめている。孤高の雰囲気。','魔法陣を展開し、両手に光のエネルギーを集めている。集中した表情と張りつめた空気。','地面に着地した直後のポーズ。衝撃で砕けた地面、髪と衣装がまだなびいている。','走りながら振り返り、笑顔を見せる。軽やかな動き、明るくポップな雰囲気。','巨大な武器を構えている。重さを感じる踏み込み、視線はまっすぐ前を向いている。','片手をこちらへ伸ばし、今まさに魔法を発動しようとしている。指先に光が集まる。','低い姿勢で地面を蹴って突進している。髪と衣装が後方へ流れ、スピード感が強い。','片膝をついて必殺技を溜めている。足元に光が集まり、次の瞬間に放つ緊張感。','両手で大きな武器を振り下ろしている。画面手前に武器が大きく入り、迫力がある。','空中でこちらに向かって手を伸ばしている。浮遊感と奥行きのあるアクション。','戦闘後に静かに立っている。周囲に煙と光が残り、余韻のあるクールな決めポーズ。'],
effects:['光の粒子が周囲に漂う。少なめで整理された輝き、ファンタジックで清潔な雰囲気。','魔法陣と光の幾何学模様。シャープなラインと発光するシンボル。','爆発の瞬間のエフェクト。整理された火花と破片、力強いが画面が散らからない。','風のエフェクト。流線と葉や花びらが舞い、動きと方向性を表現する。','水のエフェクト。水しぶきや波紋、光を受けてキラキラと輝く水の粒子。','電撃・放電エフェクト。鋭いジャギーラインと青白い発光、高エネルギーの表現。','炎のエフェクト。躍動感のある炎の揺らぎ、オレンジ〜赤の暖色グラデーション。','エフェクトなし。シンプルでクリーンな画面、キャラクターそのものを際立たせる。','星屑のような小さな光が周囲に散る。量は控えめで、画面を汚さない。','衝撃波と空気の歪み。キャラクターの動きに合わせて背景が軽く流れる。'],
composition:['上半身クローズアップ。表情とシルエットがはっきり見える、王道のキャラクター構図。','ローアングルの全身構図。見上げる視点でキャラクターを大きく力強く見せる。','斜め後ろからのシルエットショット。前方の景色を見つめる後ろ姿、叙情的な雰囲気。','正面からの全身構図。シンプルで読みやすく、キャラクターデザイン全体を見せる。','俯瞰気味の構図。キャラクターを中心に配置し、周囲の空間を活かした余白の使い方。','ダイナミックなアクション構図。強い遠近感とダッチアングル、迫力と臨場感。','二人のキャラクターを対比させる構図。左右に配置し、表情やシルエットを対比。','自然光の中でのポートレート風。ソフトな光とぼけた背景、写真的な空気感。','アニメキービジュアル風の中央配置。キャラクターを大きく見せ、背景は整理する。','斜め構図のバストアップ。顔・目線・髪の動きを強調し、画面にリズムを出す。','超ワイドのシネマ構図。キャラクターを片側に置き、背景と余白で物語性を出す。','魚眼気味の近接構図。手前の手や武器を大きく見せ、奥行きと迫力を強調する。','逆光シルエット構図。輪郭とリムライトを強調し、印象的な決めカットにする。','斜め上からのバトル構図。地面のひび割れやエフェクトの広がりを見せる。','雑誌表紙風の中央構図。キャラクターを大きく配置し、背景は整理されたグラフィック風。'],
gimmick:['片目を覆うSFバイザー。近未来的でクールな印象。','大きなリボンのヘアアクセサリー。かわいらしさを強調するクラシカルなデザイン。','肩に乗る小さな使い魔（猫・鳥・ドラゴンなど）。キャラクターに親しみやすさを加える。','背中から生える光の翼。エネルギーで構成されたデジタルな質感。','手首や腕に巻かれた魔法の紋章。発光する細いラインのシンボル。','大剣や槍などの大型武器を持っている。キャラクターとのサイズ対比で迫力を出す。','マントや外套が風になびいている。シルエットに動きとボリュームを加える。','追加ギミックなし。装飾を省いてキャラクターのシルエットをシンプルに見せる。','小型ドローンが周囲を飛んでいる。SF感を足しつつ、主役を邪魔しない配置。','宝石のように光るペンダント。胸元に小さなアクセントとして配置する。'],
light:['柔らかい自然光。窓から差し込む朝の光、やわらかく温かみのある日常感。'+NIJI_SUFFIX,'夕暮れの逆光。シルエットが際立つドラマチックな橙と紫のグラデーション空。'+NIJI_SUFFIX,'夜のネオンライト。青・ピンク・紫の光が入り混じる都市の夜、高コントラスト。'+NIJI_SUFFIX,'魔法の発光エフェクト。キャラクター周囲に青白い光のオーラ、幻想的で神秘的な雰囲気。'+NIJI_SUFFIX,'強いスタジオ照明風のリムライト。背景は暗く、キャラクターだけが鮮やかに浮かび上がる。'+NIJI_SUFFIX,'満月の夜の青白い月光。静かで神秘的、深い影と冷たい光のコントラスト。'+NIJI_SUFFIX,'桜の木の下の柔らかいピンク光。花びらが舞い、光が優しく拡散する春の雰囲気。'+NIJI_SUFFIX,'雨の中の光。濡れた地面への光の反射、しっとりと落ち着いたドラマチックな雰囲気。'+NIJI_SUFFIX,'強い逆光とリムライト。輪郭が鮮明に光り、アニメの決めカットのように見せる。'+NIJI_SUFFIX,'白背景に近い明るいハイキー照明。清潔感があり、キャラクターの色をきれいに見せる。'+NIJI_SUFFIX]};
function presetWith(name,description,mods={},strengthMods={}){let fs=JSON.parse(JSON.stringify(defaultFields)).map(f=>{if(mods[f.key])f.value=mods[f.key];return{key:f.key,value:f.value}});let ss=JSON.parse(JSON.stringify(defaultStrengths)).map(s=>({key:s.key,value:strengthMods[s.key]??s.value}));return{name,description,fields:fs,strengths:ss}}
const builtInPresets=[presetWith('魔法少女レールガン','現在の基本テンプレ。迫力・エフェクト重視。'),presetWith('日常アニメ・高品質','エフェクト控えめ。かわいい日常イラスト向け。',{basic:'かわいいアニメ風の女の子。親しみやすく愛らしい表情。若々しい顔立ち、丸顔、大きな瞳。',costume:'清潔感のあるカジュアルな私服。色数は整理され、シルエットが読みやすい。',action:'明るい街角で楽しそうに振り返っている。自然なポーズ、やわらかい動き、表情が主役。',effects:'派手なエフェクトは入れない。光の粒子は少しだけ、清潔で見やすい画面。',composition:'上半身から全身が自然に入る構図。背景はシンプルで、主役を邪魔しない。'},{action:3,impact:3,effects:2,info:3}),presetWith('バトルアニメ・超迫力','構図・衝撃波・迫力を最大化。',{action:'巨大な武器から超高出力の一撃を放つ。強烈な反動で身体が後ろに押されるが、低い前傾姿勢で耐えている。足元が砕け、衝撃波が地面を走る。髪と衣装が爆風で大きくなびく。',composition:'超ローアングル、魚眼気味の遠近感、ダッチアングル。武器とビームを画面手前に大きく配置し、圧倒的な迫力を出す。'},{action:10,impact:10,effects:9,info:7})];
let aspectRatio=localStorage.getItem('imgPromptMakerV2_aspect')||'portrait';
let charCount=localStorage.getItem('imgPromptMakerV2_charcount')||'1';

let fields=JSON.parse(JSON.stringify(defaultFields)),strengths=JSON.parse(JSON.stringify(defaultStrengths)),customPresets=[],history=[];const el=id=>document.getElementById(id),status=el('status'),output=el('output'),pwaState=el('pwaState');
function safeParse(key,fallback){try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):fallback}catch(_){return fallback}}
function loadAll(){let sf=safeParse(storageKeys.fields,[]),ss=safeParse(storageKeys.strengths,[]);customPresets=safeParse(storageKeys.presets,[]);history=safeParse(storageKeys.history,[]);sf.forEach(saved=>{let t=fields.find(f=>f.key===saved.key);if(t&&typeof saved.value==='string')t.value=saved.value});ss.forEach(saved=>{let t=strengths.find(s=>s.key===saved.key);if(t&&typeof saved.value==='number')t.value=saved.value})}
function getFieldValue(key){const n=el('field-'+key);return n?n.value.trim():(fields.find(f=>f.key===key)?.value||'').trim()}function getStrengthValue(key){const n=el('strength-'+key);return n?Number(n.value):Number(strengths.find(s=>s.key===key)?.value||0)}
function saveAll(){localStorage.setItem(storageKeys.fields,JSON.stringify(fields.map(f=>({key:f.key,value:getFieldValue(f.key)}))));localStorage.setItem(storageKeys.strengths,JSON.stringify(strengths.map(s=>({key:s.key,value:getStrengthValue(s.key)}))));localStorage.setItem(storageKeys.presets,JSON.stringify(customPresets));localStorage.setItem(storageKeys.history,JSON.stringify(history))}
function showStatus(m){status.textContent=m;setTimeout(()=>{if(status.textContent===m)status.textContent=''},2200)}function setTab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));el('section-'+t).classList.add('active')}
function getAspectLabel(v){const map={portrait:'縦長 (2:3)',square:'正方形 (1:1)',landscape:'横長 (3:2)',wide:'ワイド (16:9)',tall:'超縦長 (9:16)'};return map[v]||v}
function buildCharCountInstruction(v){const map={'1':'キャラクターは1人。','2':'キャラクターは2人で構成する。','3':'キャラクターは3人で構成する。','4':'キャラクターは4人で構成する。','5':'キャラクターは5人で構成する。','5+':'キャラクターは6人以上の多人数グループで構成する。'};return map[v]||''}
function buildThemeColorInstruction(v){if(!v||v==='none')return '';const map={red:'イラスト全体のテーマカラーは赤系（深紅・スカーレット・ワインレッドなど）。照明・エフェクト・小物の色味に反映する。',orange:'イラスト全体のテーマカラーはオレンジ系（朱・琥珀・夕焼けオレンジなど）。照明・エフェクト・小物の色味に反映する。',yellow:'イラスト全体のテーマカラーは黄色系（金・レモン・パステルイエローなど）。照明・エフェクト・小物の色味に反映する。',green:'イラスト全体のテーマカラーは緑系（エメラルド・深緑・ミントグリーンなど）。照明・エフェクト・小物の色味に反映する。',blue:'イラスト全体のテーマカラーは青系（ロイヤルブルー・スカイブルー・ネイビーなど）。照明・エフェクト・小物の色味に反映する。',purple:'イラスト全体のテーマカラーは紫系（ラベンダー・ディープパープル・バイオレットなど）。照明・エフェクト・小物の色味に反映する。',pink:'イラスト全体のテーマカラーはピンク系（ベビーピンク・ホットピンク・サーモンピンクなど）。照明・エフェクト・小物の色味に反映する。',white:'イラスト全体のテーマカラーは白・シルバー系（パールホワイト・アイスシルバーなど）。清潔感と透明感を演出する。',black:'イラスト全体のテーマカラーは黒系（ジェットブラック・チャコール・ダークグレーなど）。クールでシックな雰囲気を演出する。',gold:'イラスト全体のテーマカラーはゴールド・シャンパン系。リッチで華やかな雰囲気を演出する。',cyan:'イラスト全体のテーマカラーはシアン・水色系（アクア・ターコイズ・ティールなど）。清涼感と幻想感を演出する。',rainbow:'イラスト全体に虹色・マルチカラーの配色を取り入れる。鮮やかでポップ、祝祭感のある雰囲気。'};return map[v]||''}
function buildAspectInstruction(v){const map={portrait:'縦長構図（2:3相当）で出力する。',square:'正方形構図（1:1）で出力する。',landscape:'横長構図（3:2相当）で出力する。',wide:'ワイドスクリーン構図（16:9）で出力する。',tall:'スマホ縦向き構図（9:16）で出力する。'};return map[v]||''}
function renderPromptFields(){const s=el('section-prompt');s.innerHTML='';const aw=document.createElement('div');aw.className='field';aw.innerHTML=`<label>🖼 アスペクト比</label><div class="hint">生成画像の縦横比を指定します。プロンプトに自動反映されます。</div><select id="aspectSelect"><option value="portrait" ${aspectRatio==='portrait'?'selected':''}>縦長 (2:3)</option><option value="square" ${aspectRatio==='square'?'selected':''}>正方形 (1:1)</option><option value="landscape" ${aspectRatio==='landscape'?'selected':''}>横長 (3:2)</option><option value="wide" ${aspectRatio==='wide'?'selected':''}>ワイド (16:9)</option><option value="tall" ${aspectRatio==='tall'?'selected':''}>超縦長 (9:16)</option></select>`;s.appendChild(aw);el('aspectSelect').addEventListener('change',function(){aspectRatio=this.value;localStorage.setItem('imgPromptMakerV2_aspect',aspectRatio);updateOutput()});
// キャラクター人数
const cw=document.createElement('div');cw.className='field';cw.innerHTML=`<label>👥 キャラクター人数</label><div class="hint">生成するキャラクターの人数を指定します。プロンプトに自動反映されます。</div><select id="charCountSelect"><option value="1" ${charCount==='1'?'selected':''}>1人</option><option value="2" ${charCount==='2'?'selected':''}>2人</option><option value="3" ${charCount==='3'?'selected':''}>3人</option><option value="4" ${charCount==='4'?'selected':''}>4人</option><option value="5" ${charCount==='5'?'selected':''}>5人</option><option value="5+" ${charCount==='5+'?'selected':''}>5人以上（グループ）</option></select>`;s.appendChild(cw);el('charCountSelect').addEventListener('change',function(){charCount=this.value;localStorage.setItem('imgPromptMakerV2_charcount',charCount);updateOutput()});

const tw=document.createElement('div');tw.className='field';tw.innerHTML=`<label>🎨 テーマカラー <span style="font-size:0.8em;font-weight:normal;opacity:0.6">（未選択なら反映されません）</span></label><div class="hint">イラスト全体の色の方向性を指定します。「未設定」を選ぶと反映されません。</div><select id="themeColorSelect"><option value="none" ${themeColor==='none'?'selected':''}>未設定</option><option value="red" ${themeColor==='red'?'selected':''}>🔴 レッド系</option><option value="orange" ${themeColor==='orange'?'selected':''}>🟠 オレンジ系</option><option value="yellow" ${themeColor==='yellow'?'selected':''}>🟡 イエロー系</option><option value="green" ${themeColor==='green'?'selected':''}>🟢 グリーン系</option><option value="blue" ${themeColor==='blue'?'selected':''}>🔵 ブルー系</option><option value="purple" ${themeColor==='purple'?'selected':''}>🟣 パープル系</option><option value="pink" ${themeColor==='pink'?'selected':''}>🩷 ピンク系</option><option value="white" ${themeColor==='white'?'selected':''}>⚪ ホワイト・シルバー系</option><option value="black" ${themeColor==='black'?'selected':''}>⚫ ブラック系</option><option value="gold" ${themeColor==='gold'?'selected':''}>🟤 ゴールド系</option><option value="cyan" ${themeColor==='cyan'?'selected':''}>🩵 シアン・水色系</option><option value="rainbow" ${themeColor==='rainbow'?'selected':''}>🌈 レインボー</option></select>`;s.appendChild(tw);el('themeColorSelect').addEventListener('change',function(){themeColor=this.value;localStorage.setItem('imgPromptMakerV2_theme',themeColor);updateOutput()});
fields.forEach(f=>{let w=document.createElement('div');w.className='field';w.innerHTML=`<label for="field-${f.key}"># ---【${f.title}】---</label><div class="hint">${f.hint}</div><textarea id="field-${f.key}" data-key="${f.key}" spellcheck="false">${f.value}</textarea>`;s.appendChild(w)});s.querySelectorAll('textarea').forEach(t=>t.addEventListener('input',()=>{let target=fields.find(f=>f.key===t.dataset.key);if(target)target.value=t.value;updateOutput();saveAll()}))}
function renderStrengths(){const s=el('section-strength');s.innerHTML='<div class="mini-card"><div class="mini-card-title">強度設定</div><div class="mini-card-preview">数値を上げるほど、完成プロンプト末尾に強い指示として反映されます。0〜10の10段階で調整できます。</div></div>';strengths.forEach(x=>{let w=document.createElement('div');w.className='control';w.innerHTML=`<label for="strength-${x.key}">${x.title}</label><div class="hint">低：${x.low}　/　高：${x.high}</div><div class="slider-row"><input id="strength-${x.key}" type="range" min="0" max="10" step="1" value="${x.value}" data-key="${x.key}"><div class="value-pill" id="value-${x.key}">${x.value}</div></div>`;s.appendChild(w)});s.querySelectorAll('input[type=range]').forEach(r=>r.addEventListener('input',()=>{let t=strengths.find(s=>s.key===r.dataset.key);if(t)t.value=Number(r.value);el('value-'+r.dataset.key).textContent=r.value;updateOutput();saveAll()}))}
function renderRandom(){const s=el('section-random');s.innerHTML='<div class="mini-card"><div class="mini-card-title">ランダム生成</div><div class="mini-card-preview">選んだ項目だけランダムに差し替えます。光・色は必ずniji journey風の記述が含まれます。</div></div><div class="buttons"><button data-random="hair">髪型</button><button data-random="body">体型</button><button data-random="costume">衣装</button><button data-random="action">アクション</button><button data-random="effects">エフェクト</button><button data-random="composition">構図</button><button data-random="light">光・色</button><button data-random="gimmick">追加ギミック</button><button class="secondary" id="randomAllBtn">まとめてランダム</button></div>';s.querySelectorAll('[data-random]').forEach(b=>b.addEventListener('click',()=>randomizeOne(b.dataset.random)));el('randomAllBtn').addEventListener('click',randomizeAll)}
function renderPresets(){const s=el('section-presets'),all=[...builtInPresets,...customPresets];s.innerHTML='<div class="mini-card"><div class="mini-card-title">プリセット保存</div><div class="mini-card-preview">現在の入力と強度を保存して、あとからワンタップ復元できます。</div><input id="presetName" placeholder="例：魔法少女・超ローアングル版"><div class="buttons"><button class="good" id="savePresetBtn">現在の状態をプリセット保存</button></div></div><div id="presetList"></div>';el('savePresetBtn').addEventListener('click',savePreset);const list=el('presetList');all.forEach((p,i)=>{let isCustom=i>=builtInPresets.length;let c=document.createElement('div');c.className='mini-card';c.innerHTML=`<div class="mini-card-title">${p.name}</div><div class="mini-card-meta">${isCustom?'ユーザー保存プリセット':'内蔵プリセット'}</div><div class="mini-card-preview">${p.description||'保存済みプリセット'}</div><div class="buttons"><button data-load-preset="${i}">読み込む</button>${isCustom?`<button class="ghost" data-delete-preset="${i-builtInPresets.length}">削除</button>`:''}</div>`;list.appendChild(c)});list.querySelectorAll('[data-load-preset]').forEach(b=>b.addEventListener('click',()=>loadPreset(Number(b.dataset.loadPreset))));list.querySelectorAll('[data-delete-preset]').forEach(b=>b.addEventListener('click',()=>{customPresets.splice(Number(b.dataset.deletePreset),1);saveAll();renderPresets();showStatus('プリセットを削除しました。')}))}
function renderHistory(){const s=el('section-history');s.innerHTML='<div class="mini-card"><div class="mini-card-title">履歴保存・エクスポート・インポート</div><div class="mini-card-preview">当たりプロンプトを保存できます。JSONとしてバックアップ・移行もできます。</div><div class="buttons"><button class="good" id="historySaveBtn">現在を履歴に保存</button><button class="secondary" id="exportBtn">履歴をエクスポート</button><button class="ghost" id="importBtn">履歴をインポート</button><button class="warn" id="clearHistoryBtn">履歴全削除</button></div><input type="file" id="importFile" accept="application/json" style="display:none"><div class="danger-text">※ インポートは現在の履歴に追加します。</div></div><div id="historyList"></div>';el('historySaveBtn').addEventListener('click',saveHistory);el('exportBtn').addEventListener('click',exportHistory);el('importBtn').addEventListener('click',()=>el('importFile').click());el('importFile').addEventListener('change',importHistory);el('clearHistoryBtn').addEventListener('click',()=>{if(!confirm('履歴をすべて削除しますか？'))return;history=[];saveAll();renderHistory();showStatus('履歴を削除しました。')});const list=el('historyList');if(!history.length){list.innerHTML='<div class="mini-card"><div class="mini-card-preview">履歴はまだありません。</div></div>';return}history.slice().reverse().forEach((item,ri)=>{let i=history.length-1-ri;let c=document.createElement('div');c.className='mini-card';c.innerHTML=`<div class="mini-card-title">${escapeHtml(item.title||'保存プロンプト')}</div><div class="mini-card-meta">${new Date(item.createdAt).toLocaleString('ja-JP')}</div><div class="mini-card-preview">${escapeHtml(item.prompt||'').slice(0,220)}</div><div class="buttons"><button data-copy-history="${i}">コピー</button><button class="secondary" data-restore-history="${i}">復元</button><button class="ghost" data-delete-history="${i}">削除</button></div>`;list.appendChild(c)});list.querySelectorAll('[data-copy-history]').forEach(b=>b.addEventListener('click',()=>copyText(history[Number(b.dataset.copyHistory)].prompt,'履歴プロンプトをコピーしました。')));list.querySelectorAll('[data-restore-history]').forEach(b=>b.addEventListener('click',()=>restoreSnapshot(history[Number(b.dataset.restoreHistory)])));list.querySelectorAll('[data-delete-history]').forEach(b=>b.addEventListener('click',()=>{history.splice(Number(b.dataset.deleteHistory),1);saveAll();renderHistory();showStatus('履歴を削除しました。')}))}
function strengthPhrase(k,v){const m={anime:v>=8?'2Dアニメらしさを強く出し、実写感や3D感は避ける。':v>=5?'アニメ調を維持する。':v>=1?'アニメ感は控えめにする。':'',cell:v>=8?'セルアニメ塗りを最優先し、影は硬く、境界を明確にする。':v>=5?'セル塗りを基調にしつつ、自然な陰影にする。':v>=1?'柔らかい陰影も少し許容する。':'',niji:v>=8?'色彩とライティングはかなり鮮やかで高コントラストにする。ただし塗りはセル塗りを維持する。':v>=5?'色彩と光は鮮やかにするが、塗りは崩さない。':v>=1?'色彩は自然で控えめにする。':'',action:v>=8?'アクションの勢い、踏み込み、衝撃、画面の圧を非常に強くする。':v>=5?'アクション感をしっかり出す。':v>=1?'動きは控えめで読みやすくする。':'',impact:v>=8?'圧倒的な迫力と臨場感を出す。見る人を引き込むような緊張感と存在感。':v>=5?'迫力と臨場感をしっかり意識した仕上がりにする。':v>=1?'落ち着いた雰囲気を維持する。':'',effects:v>=8?'爆発・光・煙・火花などエフェクトを全般的に派手にし、画面に動きと迫力を与える。':v>=5?'エフェクトを適度に入れてダイナミックさを演出する。':v>=1?'エフェクトは控えめにし、すっきりした画面にする。':'',info:v>=8?'画面全体に情報を詰め込み、見ごたえのある密度にする。':v>=5?'背景や小物など適度な情報量で画面に奥行きを出す。':v>=1?'余白を活かしたシンプルな構成にする。':'',clean:v>=8?'ノイズ、ざらつき、過剰な粒子、にじみを強く抑え、クリーンでシャープに仕上げる。':v>=5?'全体をクリアに仕上げる。':v>=1?'多少の質感は許容する。':'',line:v>=8?'線画は太めでクリーン、均一な線幅にする。':v>=5?'線画は安定して読みやすくする。':v>=1?'線画は自然な細さにする。':''};return m[k]||''}
function buildPrompt(){let body=fields.map(f=>`# ---【${f.title}】${f.hint}---\n${getFieldValue(f.key)}`).join('\n\n');let st=strengths.map(s=>strengthPhrase(s.key,getStrengthValue(s.key))).filter(Boolean).join('\n');let aspect=buildAspectInstruction(aspectRatio);let charInst=buildCharCountInstruction(charCount);let themeInst=buildThemeColorInstruction(themeColor);let extras=[];if(charInst)extras.push('# ---【キャラクター人数】---\n'+charInst);if(themeInst)extras.push('# ---【テーマカラー】---\n'+themeInst);extras.push('# ---【アスペクト比】---\n'+aspect);return `${body}\n\n# ---【強度設定からの追加指示】---\n${st}\n\n${extras.join('\n\n')}`.trim()}function updateOutput(){output.textContent=buildPrompt()}
function optimizeText(t){return t.replace(/[、,]\s*[、,]+/g,'、').replace(/[。．]\s*[。．]+/g,'。').replace(/\s+/g,' ').replace(/ 、/g,'、').replace(/ 。/g,'。').trim()}function setStrength(k,v){let t=strengths.find(s=>s.key===k);if(t)t.value=v;let r=el('strength-'+k),p=el('value-'+k);if(r)r.value=v;if(p)p.textContent=v}
function optimizeAll(){fields.forEach(f=>{let v=getFieldValue(f.key);v=v.replace(/niji journey風の鮮やかな色彩設計と高コントラストな光表現（塗りには影響しない）/g,'niji journey風の色彩と光表現はライティングと配色にのみ反映する').replace(/グラデーションなし、色のにじみなし、フラットな色面/g,'グラデーションを抑え、色のにじみを避け、フラットな色面を保つ');v=optimizeText(v);if(f.key==='quality'){v=v.replace(/禁止事項/g,'避けたい要素').replace(/奇形/g,'身体の破綻')}f.value=v;let n=el('field-'+f.key);if(n)n.value=v});setStrength('clean',Math.max(getStrengthValue('clean'),9));setStrength('cell',Math.max(getStrengthValue('cell'),9));setStrength('effects',Math.min(getStrengthValue('effects'),6));updateOutput();saveAll();showStatus('ChatGPT / Images2.0向けに自然文として最適化しました。')}
function pick(a){return a[Math.floor(Math.random()*a.length)]}function randomizeOne(k){let target=fields.find(f=>f.key===k);if(!target||!randomPools[k])return;target.value=pick(randomPools[k]);let n=el('field-'+k);if(n)n.value=target.value;updateOutput();saveAll();showStatus(`${target.title}をランダム生成しました。`)}function randomizeAll(){['hair','body','costume','action','effects','composition','light','gimmick'].forEach(k=>{let target=fields.find(f=>f.key===k);if(target&&randomPools[k]){target.value=pick(randomPools[k]);let n=el('field-'+k);if(n)n.value=target.value}});updateOutput();saveAll();showStatus('主要項目をまとめてランダム生成しました。')}
async function copyText(t,m){try{await navigator.clipboard.writeText(t);showStatus(m)}catch(e){showStatus('コピーに失敗しました。出力欄を長押しして手動コピーしてください。')}}function saveHistory(){let title=prompt('履歴名を入力してください','保存プロンプト '+new Date().toLocaleString('ja-JP'));if(title===null)return;history.push({title:title||'保存プロンプト',createdAt:new Date().toISOString(),prompt:buildPrompt(),fields:fields.map(f=>({key:f.key,value:getFieldValue(f.key)})),strengths:strengths.map(s=>({key:s.key,value:getStrengthValue(s.key)}))});saveAll();renderHistory();showStatus('履歴に保存しました。')}function exportHistory(){let data={app:'Images2.0 / ChatGPT Prompt Maker',version:2,exportedAt:new Date().toISOString(),history};let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='prompt-history-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);showStatus('履歴を書き出しました。')}function importHistory(e){let file=e.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{try{let data=JSON.parse(reader.result);let imported=Array.isArray(data.history)?data.history:Array.isArray(data)?data:[];let valid=imported.filter(i=>i.prompt&&i.createdAt);history=history.concat(valid);saveAll();renderHistory();showStatus(`${valid.length}件の履歴をインポートしました。`)}catch(_){showStatus('インポートに失敗しました。JSON形式を確認してください。')}};reader.readAsText(file);e.target.value=''}
function restoreSnapshot(snap){if(!snap)return;if(Array.isArray(snap.fields))snap.fields.forEach(saved=>{let t=fields.find(f=>f.key===saved.key);if(t)t.value=saved.value});if(Array.isArray(snap.strengths))snap.strengths.forEach(saved=>{let t=strengths.find(s=>s.key===saved.key);if(t)t.value=saved.value});renderPromptFields();renderStrengths();updateOutput();saveAll();showStatus('履歴から復元しました。')}function savePreset(){let name=el('presetName').value.trim();if(!name){showStatus('プリセット名を入力してください。');return}customPresets.push({name,description:'ユーザー保存プリセット',createdAt:new Date().toISOString(),fields:fields.map(f=>({key:f.key,value:getFieldValue(f.key)})),strengths:strengths.map(s=>({key:s.key,value:getStrengthValue(s.key)}))});el('presetName').value='';saveAll();renderPresets();showStatus('プリセットを保存しました。')}function loadPreset(i){let all=[...builtInPresets,...customPresets],p=all[i];if(!p)return;p.fields.forEach(saved=>{let t=fields.find(f=>f.key===saved.key);if(t)t.value=saved.value});p.strengths.forEach(saved=>{let t=strengths.find(s=>s.key===saved.key);if(t)t.value=saved.value});renderPromptFields();renderStrengths();updateOutput();saveAll();showStatus(`「${p.name}」を読み込みました。`)}function resetAll(){if(!confirm('入力と強度を初期値に戻しますか？履歴とプリセットは残ります。'))return;fields=JSON.parse(JSON.stringify(defaultFields));strengths=JSON.parse(JSON.stringify(defaultStrengths));renderPromptFields();renderStrengths();updateOutput();saveAll();showStatus('初期値に戻しました。')}function escapeHtml(str){return str.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function bind(id,h){let n=el(id);if(n)n.addEventListener('click',h)}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));bind('copyBtn',()=>copyText(buildPrompt(),'完成プロンプトをコピーしました。'));bind('copyBtnMobile',()=>copyText(buildPrompt(),'完成プロンプトをコピーしました。'));bind('optimizeBtn',optimizeAll);bind('optimizeBtnMobile',optimizeAll);bind('saveHistoryBtn',saveHistory);bind('saveHistoryBtnMobile',saveHistory);bind('resetBtn',resetAll);if('serviceWorker'in navigator){window.addEventListener('load',async()=>{try{await navigator.serviceWorker.register('./sw.js');pwaState.textContent='PWA対応済み'}catch(e){pwaState.textContent='PWA未登録'}})}else{pwaState.textContent='PWA非対応'}loadAll();renderPromptFields();renderStrengths();renderRandom();renderPresets();renderHistory();updateOutput();
</script></body></html>
