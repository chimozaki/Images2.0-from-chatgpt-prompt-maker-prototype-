function renderPresets(){const s=el('section-presets'),all=[...builtInPresets,...customPresets];s.innerHTML='<div class="mini-card"><div class="mini-card-title">プリセット保存</div><div class="mini-card-preview">現在の入力と強度を保存して、あとからワンタップ復元できます。</div><input id="presetName" placeholder="例：魔法少女・超ローアングル版"><div class="buttons"><button class="good" id="savePresetBtn">💾 現在の状態を保存</button><button class="secondary" id="exportPresetsBtn">📤 エクスポート</button><button class="secondary" id="importPresetsBtn">📥 インポート</button></div></div><div id="presetList"></div>';el('savePresetBtn').addEventListener('click',savePreset);el('exportPresetsBtn').addEventListener('click',exportPresets);el('importPresetsBtn').addEventListener('click',importPresets);const list=el('presetList');all.forEach((p,i)=>{let isCustom=i>=builtInPresets.length;let c=document.createElement('div');c.className='mini-card';c.innerHTML=`<div class="mini-card-title">${p.name}</div><div class="mini-card-meta">${isCustom?'ユーザー保存プリセット':'内蔵プリセット'}</div><div class="mini-card-preview">${p.description||'保存済みプリセット'}</div><div class="buttons"><button data-load-preset="${i}">読み込む</button>${isCustom?`<button class="ghost" data-delete-preset="${i-builtInPresets.length}">削除</button>`:''}</div>`;list.appendChild(c)});list.querySelectorAll('[data-load-preset]').forEach(b=>b.addEventListener('click',()=>loadPreset(Number(b.dataset.loadPreset))));list.querySelectorAll('[data-delete-preset]').forEach(b=>b.addEventListener('click',()=>{customPresets.splice(Number(b.dataset.deletePreset),1);saveAll();renderPresets();showStatus('プリセットを削除しました。')}))}
function renderHistory(){const s=el('section-history');s.innerHTML='<div class="mini-card"><div class="mini-card-title">履歴保存・エクスポート・インポート</div><div class="mini-card-preview">当たりプロンプトを保存できます。JSONとしてバックアップ・移行もできます。</div><div class="buttons"><button class="good" id="historySaveBtn">現在を履歴に保存</button><button class="secondary" id="exportBtn">履歴をエクスポート</button><button class="ghost" id="importBtn">履歴をインポート</button><button class="warn" id="clearHistoryBtn">履歴全削除</button></div><input type="file" id="importFile" accept="application/json" style="display:none"><div class="danger-text">※ インポートは現在の履歴に追加します。</div></div><div id="historyList"></div>';el('historySaveBtn').addEventListener('click',saveHistory);el('exportBtn').addEventListener('click',exportHistory);el('importBtn').addEventListener('click',()=>el('importFile').click());el('importFile').addEventListener('change',importHistory);el('clearHistoryBtn').addEventListener('click',()=>{if(!confirm('履歴をすべて削除しますか？'))return;history=[];saveAll();renderHistory();showStatus('履歴を削除しました。')});const list=el('historyList');if(!history.length){list.innerHTML='<div class="mini-card"><div class="mini-card-preview">履歴はまだありません。</div></div>';return}history.slice().reverse().forEach((item,ri)=>{let i=history.length-1-ri;let c=document.createElement('div');c.className='mini-card';c.innerHTML=`<div class="mini-card-title">${escapeHtml(item.title||'保存プロンプト')}</div><div class="mini-card-meta">${new Date(item.createdAt).toLocaleString('ja-JP')}</div><div class="mini-card-preview">${escapeHtml(item.prompt||'').slice(0,220)}</div><div class="buttons"><button data-copy-history="${i}">コピー</button><button class="secondary" data-restore-history="${i}">復元</button><button class="ghost" data-delete-history="${i}">削除</button></div>`;list.appendChild(c)});list.querySelectorAll('[data-copy-history]').forEach(b=>b.addEventListener('click',()=>copyText(history[Number(b.dataset.copyHistory)].prompt,'履歴プロンプトをコピーしました。')));list.querySelectorAll('[data-restore-history]' function strengthPhrase(k,v){const m={anime:v>=8?'2Dアニメらしさを強く出し、実写感や3D感は避ける。':v>=5?'アニメ調を維持する。':v>=1?'アニメ感は控えめにする。':'',cell:v>=8?'セルアニメ塗りを最優先し、影は硬く、境界を明確にする。':v>=5?'セル塗りを基調にしつつ、自然な陰影にする。':v>=1?'柔らかい陰影も少し許容する。':'',niji:v>=8?'高彩度な色彩、強いコントラスト、局所的な色変化をライティングと反射光に限定して使う。塗りはセル塗りを維持する。':v>=5?'鮮やかな色彩、高コントラストなライティング、色変化はライティングと配色にのみ適用する。':v>=1?'自然な色彩、控えめなライティングにする。':'',air:v<=2?'空気感なし、フラットでくっきりしたライティング。':v<=5?'軽い拡散光、微細な空気層、透明感のある色彩。':v<=8?'柔らかい拡散光、空気遠近、うっすらとした光の層、繊細なリムライト。':'強い光の層、空気の霞、ドラマチックなリムライト、奥行きのある空気感。',action:v>=8?'アクションの勢い、踏み込み、衝撃、画面の圧を非常に強くする。':v>=5?'アクション感をしっかり出す。':v>=1?'動きは控えめで読みやすくする。':'',impact:v>=8?'圧倒的な迫力と臨場感を出す。見る人を引き込むような緊張感と存在感。':v>=5?'迫力と臨場感をしっかり意識した仕上がりにする。':v>=1?'落ち着いた雰囲気を維持する。':'',effects:v>=8?'爆発・光・煙・火花などエフェクトを全般的に派手にし、画面に動きと迫力を与える。':v>=5?'エフェクトを適度に入れてダイナミックさを演出する。':v>=1?'エフェクトは控えめにし、すっきりした画面にする。':'',info:v>=8?'画面全体に情報を詰め込み、見ごたえのある密度にする。':v>=5?'背景や小物など適度な情報量で画面に奥行きを出す。':v>=1?'余白を活かしたシンプルな構成にする。':'',clean:v>=8?'ノイズ、ざらつき、過剰な粒子、にじみを強く抑え、クリーンでシャープに仕上げる。':v>=5?'全体をクリアに仕上げる。':v>=1?'多少の質感は許容する。':'',line:v>=8?'線画は太めでクリーン、均一な線幅にする。':v>=5?'線画は安定して読みやすくする。':v>=1?'線画は自然な細さにする。':''};return m[k]||''}
function buildPrompt(){let included=fields.map(f=>({f,v:getFieldValue(f.key)})).filter(x=>{if(x.f.key==='style')return false;if(x.f.key==='quality')return !featureToggles.quality&&x.v;if(x.f.key==='negative')return !featureToggles.negative&&x.v;return x.v||x.f.key!=='free'});let body=included.map(x=>`[${x.f.title}]\n${x.v}`).join('\n\n');let st=strengths.map(s=>strengthPhrase(s.key,getStrengthValue(s.key))).filter(Boolean).join('\n');let aspect=buildAspectInstruction(aspectRatio);let charInst=buildCharCountInstruction(charCount);let themeInst=buildThemeColorInstruction(themeColor);let extras=[];if(featureToggles.anime)extras.push('[アニメ塗り]\n'+ANIME_STYLE_BLOCK);if(featureToggles.quality)extras.push('[クオリティ・安定化]\n'+QUALITY_BLOCK);if(featureToggles.negative)extras.push('[ネガティブ]\n'+NEGATIVE_BLOCK);if(charInst)extras.push('[キャラクター人数]\n'+charInst);if(themeInst)extras.push('[テーマカラー]\n'+themeInst);extras.push('[アスペクト比]\n'+aspect);return `${body}\n\n[強度設定からの追加指示]\n${st}\n\n${extras.join('\n\n')}`.trim()}function updateOutput(){output.textContent=buildPrompt();updateToggleButtons();updateUndoRedoButtons()}
function optimizeText(t){return t.replace(/[、,]\s*[、,]+/g,'、').replace(/[。．]\s*[。．]+/g,'。').replace(/\s+/g,' ').replace(/ 、/g,'、').replace(/ 。/g,'。').trim()}function setStrength(k,v){let t=strengths.find(s=>s.key===k);if(t)t.value=v;let r=el('strength-'+k),p=el('value-'+k);if(r)r.value=v;if(p)p.textContent=v}
function hideOptimizeReport(){const box=el('optimizeReport');if(box){box.className='opt-report';box.innerHTML=''}}function showOptimizeReport(items){const box=el('optimizeReport');if(!box)return;if(!items||!items.length){box.className='opt-report';box.innerHTML='';return}box.className='opt-report show';box.innerHTML=`<div class="opt-report-title">最適化で変更した内容</div><ul>${items.map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul>`}function optimizeAll(){let report=[];fields.forEach(f=>{let before=getFieldValue(f.key);let v=before;v=optimizeText(v);f.value=v;let n=el('field-'+f.key);if(n)n.value=v;if(before!==v)report.push(`${f.title}：重複・余分な空白・表現ゆれを整理`)});let cleanBefore=getStrengthValue('clean'),cellBefore=getStrengthValue('cell'),effectsBefore=getStrengthValue('effects'),airBefore=getStrengthValue('air');setStrength('clean',Math.max(cleanBefore,9));setStrength('cell',Math.max(cellBefore,9));setStrength('air',Math.max(airBefore,3));setStrength('effects',Math.min(effectsBefore,6));if(getStrengthValue('clean')!==cleanBefore)report.push(`ノイズ抑制：${cleanBefore} → ${getStrengthValue('clean')} に強化`);if(getStrengthValue('cell')!==cellBefore)report.push(`セル塗り固定：${cellBefore} → ${getStrengthValue('cell')} に強化`);if(getStrengthValue('air')!==airBefore)report.push(`空気感：${airBefore} → ${getStrengthValue('air')} に調整`);if(getStrengthValue('effects')!==effectsBefore)report.push(`エフェクト強度：${effectsBefore} → ${getStrengthValue('effects')} に抑制`);if(!report.length)report.push('大きな変更はありません。現在の内容はすでに整理されています。');updateOutput();saveAll();showOptimizeReport(report);showStatus('最適化しました。下の変更内容を確認してください。');showToast('✨ 最適化が適用されました')}
function pick(a){return a[Math.floor(Math.random()*a.length)]}function buildRandomBody(){return [pick(randomPools.body),pick(randomPools.bust),pick(randomPools.volume)].join(' ')}function randomizeOne(k){hideOptimizeReport();let target=fields.find(f=>f.key===k);if(!target)return;const base=randomPools[k]||[];const user=userPools[k]||[];const pool=[...base,...user];if(!pool.length)return;target.value=k==='body'?buildRandomBody():pick(pool);let n=el('field-'+k);if(n)n.value=target.value;updateOutput();saveAll();showStatus(`${target.title}をランダム生成しました。`)}function randomizeAll(){hideOptimizeReport();['body','costume','action','effects','composition','light','gimmick'].forEach(k=>{let target=fields.find(f=>f.key===k);if(target&&randomPools[k]){target.value=k==='body'?buildRandomBody():pick(randomPools[k]);let n=el('field-'+k);if(n)n.value=target.value}});updateOutput();saveAll();showStatus('主要項目をまとめてランダム生成しました。');showToast('🎲 まとめてランダムが適用されました')}
async function copyText(t,m){try{await navigator.clipboard.writeText(t);showStatus(m)}catch(e){showStatus('コピーに失敗しました。出力欄を長押しして手動コピーしてください。')}}function saveHistory(){let title=prompt('履歴名を入力してください','保存プロンプト '+new Date().toLocaleString('ja-JP'));if(title===null)return;history.push({title:title||'保存プロンプト',createdAt:new Date().toISOString(),prompt:buildPrompt(),fields:fields.map(f=>({key:f.key,value:getFieldValue(f.key)})),strengths:strengths.map(s=>({key:s.key,value:getStrengthValue(s.key)}))});saveAll();renderHistory();showStatus('履歴に保存しました。')}function exportHistory(){let data={app:'Images2.0 / ChatGPT Prompt Maker',version:2,exportedAt:new Date().toISOString(),history};let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='prompt-history-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);showStatus('履歴を書き出しました。')}function importHistory(e){let file=e.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{try{let data=JSON.parse(reader.result);let imported=Array.isArray(data.history)?data.history:Array.isArray(data)?data:[];let valid=imported.filter(i=>i.prompt&&i.createdAt);history=history.concat(valid);saveAll();renderHistory();showStatus(`${valid.length}件の履歴をインポートしました。`)}catch(_){showStatus('インポートに失敗しました。JSON形式を確認してください。')}};reader.readAsText(file);e.target.value=''}
function restoreSnapshot(snap){applySnapshot(snap,'履歴から復元しました。');saveAll()}function exportPresets(){const data={version:'1.0',exportedAt:new Date().toISOString(),customPresets,userPools};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='img2prompt_presets_'+new Date().toISOString().slice(0,10)+'.json';a.click();showToast('📤 エクスポートしました');showStatus('プリセットをJSONファイルとしてダウンロードしました。')}
function importPresets(){const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.customPresets&&Array.isArray(data.customPresets)){const before=customPresets.length;const existingNames=new Set(customPresets.map(p=>p.name));const newOnes=data.customPresets.filter(p=>!existingNames.has(p.name));customPresets.push(...newOnes);showStatus(`${newOnes.length}件のプリセットをインポートしました。（重複スキップ: ${data.customPresets.length-newOnes.length}件）`)}if(data.userPools&&typeof data.userPools==='object'){Object.keys(data.userPools).forEach(k=>{if(!userPools[k])userPools[k]=[];const existing=new Set(userPools[k]);data.userPools[k].forEach(v=>{if(!existing.has(v))userPools[k].push(v)});});showToast('📥 インポートしました')}saveAll();saveUserPools();renderPresets()}catch(err){showStatus('インポート失敗: JSONの形式が正しくありません。')}};reader.readAsText(file)};input.click()}
function savePreset(){let name=el('presetName').value.trim();if(!name){showStatus('プリセット名を入力してください。');return}customPresets.push({name,description:'ユーザー保存プリセット',createdAt:new Date().toISOString(),fields:fields.map(f=>({key:f.key,value:getFieldValue(f.key)})),strengths:strengths.map(s=>({key:s.key,value:getStrengthValue(s.key)}))});el('presetName').value='';saveAll();renderPresets();showStatus('プリセットを保存しました。')}function loadPreset(i){hideOptimizeReport();let all=[...builtInPresets,...customPresets],p=all[i];if(!p)return;p.fields.forEach(saved=>{let t=fields.find(f=>f.key===saved.key);if(t)t.value=saved.value});p.strengths.forEach(saved=>{let t=strengths.find(s=>s.key===saved.key);if(t)t.value=saved.value});renderPromptFields();renderStrengths();updateOutput();saveAll();showStatus(`「${p.name}」を読み込みました。`)}function resetAll(){hideOptimizeReport();fields=JSON.parse(JSON.stringify(defaultFields));strengths=JSON.parse(JSON.stringify(defaultStrengths));featureToggles={anime:true,quality:true,negative:true};renderPromptFields();renderStrengths();updateOutput();saveAll();showStatus('初期状態に戻しました。')}function escapeHtml(str){return str.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function bind(id,h){let n=el(id);if(n)n.addEventListener('click',h)}
